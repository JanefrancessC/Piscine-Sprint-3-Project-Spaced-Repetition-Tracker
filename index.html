<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spaced Repetition Tracker</title>
    <script type="module" src="./src/script.mjs"></script>
  </head>
  <body>
    <header>
      <h1>Spaced Repetition Tracker</h1>
    </header>
    <main>
      <section id="user-container">
        <label for="select-user">Select a user to view Agenda </label>
        <select id="select-user">
          <option value="" disabled selected>--Select a User--</option>
        </select>
      </section>
      <section id="form-container">
        <form id="topic-form">
          <label for="revision-topic">Topic:</label>
          <input
            type="text"
            id="revision-topic"
            name="revision-topic"
            required
          />
          <label for="start-date">Start Date:</label>
          <input type="date" name="start-date" id="start-date" required />
          <button type="submit">Submit</button>
        </form>
      </section>
    </main>
  </body>
</html>
